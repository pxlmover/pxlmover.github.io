<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <title>AudioReactive for Unreal Engine Documentation</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Security & CSP -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com;
    img-src 'self' https: data:;
    frame-src https://www.youtube.com;
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta property="og:title" content="AudioReactive for Unreal Engine Documentation">
<meta property="og:description" content="Interactive docs and guides for AudioReactive UE5.">
<meta property="og:image" content="https://pxlmover.github.io/images/your-og-image.png">
<meta property="og:url" content="https://pxlmover.github.io/GuideAR.html">
</head>
<body>
  <div class="super-container">
  <div class="primer-title-shell" aria-label="AudioReactive Primer">
  <div class="header primer-title">
    <span>AudioReactive</span><br>
    <span>Primer</span>
  </div>
  </div>
  <!--<div class="header-sub">
    Guide & Documentation
  </div>-->
  <div class="main-container">
    <div class="search-bar search-bar-compact">
      <input type="text" id="searchInput" placeholder="🔍 Type here to Filter">
    </div>
    <div id="search-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    <div class="categories" id="categories"></div>
    <div id="guide-featured-link"></div>
    <div class="guide-utility-actions" aria-label="Page utilities">
      <button id="theme-randomizer" class="theme-randomizer-btn" aria-label="Spectrum Shift">
        Spectrum Shift
      </button>
    </div>
    </div>
  </div>

  <!-- Info Card Modal -->
  <div id="info-modal" aria-hidden="true">
    <div id="info-modal-content" role="dialog" aria-modal="true" aria-labelledby="info-modal-title">
      <button id="info-modal-close" type="button" aria-label="Close info card">&times;</button>
      <div id="info-modal-body"></div>
    </div>
  </div>

    <script src="guide-content.js" defer></script>
    <script src="guide-page.js" defer></script>
    <script src="common.js" defer></script>
</body>
</html>
